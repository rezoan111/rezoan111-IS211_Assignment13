<!doctype html>
<html>
<head>
    <title>Student Results</title>
</head>
<body>
    <h1>Quiz Results</h1>

    {% if student %}
        <h2>{{ student.first_name }} {{ student.last_name }}</h2>

        {% if results %}
            <table border="1">
                <tr>
                    <th>Quiz ID</th>
                    <th>Score</th>
                </tr>
                {% for result in results %}
                <tr>
                    <td>{{ result.quiz_id }}</td>
                    <td>{{ result.score }}</td>
                </tr>
                {% endfor %}
            </table>
        {% else %}
            <p>No Results</p>
        {% endif %}
    {% else %}
        <p>Student not found.</p>
    {% endif %}

    <p><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>
