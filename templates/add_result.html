<!doctype html>
<html>
<head>
    <title>Add Quiz Result</title>
</head>
<body>
    <h1>Add Quiz Result</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="/results/add" method="POST">
        <label for="student_id">Student:</label>
        <select name="student_id" id="student_id">
            {% for student in students %}
                <option value="{{ student.id }}">{{ student.first_name }} {{ student.last_name }}</option>
            {% endfor %}
        </select><br><br>

        <label for="quiz_id">Quiz:</label>
        <select name="quiz_id" id="quiz_id">
            {% for quiz in quizzes %}
                <option value="{{ quiz.id }}">{{ quiz.subject }}</option>
            {% endfor %}
        </select><br><br>

        <label for="score">Score:</label>
        <input type="text" name="score" id="score"><br><br>

        <input type="submit" value="Add Quiz Result">
    </form>

    <p><a href="/dashboard">Back to Dashboard</a></p>
</body>
</html>
